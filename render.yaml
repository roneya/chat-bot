services:
  - type: web
    name: chat-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Single worker: ChromaDB PersistentClient caches the vector index per process,
    # so docs added via /api/teach in one worker are invisible to queries in another.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.6"
