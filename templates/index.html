<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 460px;
      height: 680px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #4f46e5;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 { font-size: 16px; font-weight: 600; }

    .chat-header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .chat-header button:hover { background: rgba(255,255,255,0.3); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: #f0f0f0;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .message.bot.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .typing {
      align-self: flex-start;
      color: #999;
      font-size: 13px;
      padding: 8px 14px;
    }

    .chat-input {
      display: flex;
      padding: 14px;
      border-top: 1px solid #eee;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
    }
    .chat-input input:focus { border-color: #4f46e5; }

    .chat-input button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
    }
    .chat-input button:hover { background: #4338ca; }
    .chat-input button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 20px 14px;
    }

    .suggestions button {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #4f46e5;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .suggestions button:hover { background: #e0e7ff; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h2>Customer Support</h2>
      <button onclick="resetChat()">New Chat</button>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">Hi! I'm your support assistant. How can I help you today?</div>
    </div>

    <div class="suggestions" id="suggestions">
      <button onclick="askSuggestion(this)">Return policy?</button>
      <button onclick="askSuggestion(this)">Track my order</button>
      <button onclick="askSuggestion(this)">Payment methods</button>
      <button onclick="askSuggestion(this)">Shipping time?</button>
    </div>

    <div class="chat-input">
      <input type="text" id="input" placeholder="Type your question..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const suggestionsEl = document.getElementById('suggestions');

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.textContent = 'Thinking...';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      suggestionsEl.style.display = 'none';
      addMessage(text, 'user');

      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: text }),
        });

        removeTyping();
        const data = await res.json();

        if (res.ok) {
          addMessage(data.answer, 'bot');
        } else {
          addMessage(data.error || 'Something went wrong', 'bot error');
        }
      } catch {
        removeTyping();
        addMessage('Network error. Please try again.', 'bot error');
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    function askSuggestion(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
    }

    async function resetChat() {
      await fetch('/reset', { method: 'POST' });
      messagesEl.innerHTML = '<div class="message bot">Hi! I\'m your support assistant. How can I help you today?</div>';
      suggestionsEl.style.display = 'flex';
      inputEl.focus();
    }

    inputEl.focus();
  </script>
</body>
</html>
